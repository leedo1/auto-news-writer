name: Generate Blog Post

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python generate.py
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: blog-post
          path: result.txt
